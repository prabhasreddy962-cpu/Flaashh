<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flaash AI - Product Comparison & Reviews</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Verdana, sans-serif; background-color: #f5f3f0; color: #1a1a1a; line-height: 1.6; }
        .header { background: white; padding: 1rem; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
        .logo { font-size: 18px; font-weight: 600; }
        .search-container { flex: 1; margin: 0 1rem; position: relative; }
        .search-container input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .paste-section { background: #2a2a2a; color: white; padding: 1.5rem; margin: 1rem; border-radius: 12px; }
        .paste-section h3 { font-size: 14px; margin-bottom: 0.5rem; }
        .paste-section input { width: 100%; padding: 10px 12px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; margin-bottom: 1rem; background: rgba(255,255,255,0.05); color: white; font-size: 13px; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: white; color: #2a2a2a; font-weight: 600; }
        .btn-dark { background: #2a2a2a; color: white; }
        .container { max-width: 100%; padding: 1rem; }
        h2 { font-size: 18px; font-weight: 600; margin: 1.5rem 0 1rem 0; }
        .loading { text-align: center; padding: 2rem; color: #666; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #7c3aed; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .product-card { background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
        .product-header { display: flex; gap: 12px; margin-bottom: 1rem; }
        .product-image { font-size: 40px; min-width: 50px; }
        .product-info { flex: 1; }
        .product-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .product-features { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
        .feature { font-size: 10px; color: #666; }
        .product-rating { font-size: 16px; font-weight: 600; color: #16a34a; }
        .stores-section { margin-bottom: 1rem; }
        .stores-label { font-size: 11px; color: #666; font-weight: 600; margin-bottom: 8px; }
        .stores-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-height: 220px; overflow-y: auto; padding-bottom: 8px; }
        .store-item { background: #f9f7f5; padding: 8px; border-radius: 6px; text-align: center; border: 1px solid #e0e0e0; }
        .store-item.cheapest { border: 2px solid #16a34a; background: #f0fdf4; }
        .store-icon { font-size: 18px; margin-bottom: 2px; }
        .store-name { font-size: 9px; font-weight: 600; margin-bottom: 4px; }
        .store-price { font-size: 11px; font-weight: 600; color: #16a34a; }
        .savings-box { background: #d1fae5; color: #065f46; padding: 10px; border-radius: 8px; margin-bottom: 1rem; font-size: 12px; font-weight: 600; text-align: center; }
        .error { background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 8px; margin: 1rem; font-size: 13px; }
        .success { background: #d1fae5; color: #065f46; padding: 1rem; border-radius: 8px; margin: 1rem; font-size: 13px; }
        .footer { background: #1a1a1a; color: white; padding: 2rem 1rem; margin-top: 2rem; }
        .footer-btn { padding: 10px 16px; background: white; color: #1a1a1a; border: none; border-radius: 4px; margin-right: 8px; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top"><div class="logo">≡ Flaash AI</div><i class="fas fa-search"></i></div>
        <div class="search-container"><input type="text" placeholder="Search products..."></div>
    </header>

    <div class="paste-section">
        <h3>+ Add Extension</h3>
        <input type="text" placeholder="Paste Amazon/Flipkart/Myntra link..." id="pasteInput">
        <div class="button-group">
            <button class="btn btn-primary" onclick="searchProduct()">🔍 Search</button>
            <button class="btn btn-primary" onclick="pasteLink()">📎 Paste Link</button>
            <button class="btn btn-primary" onclick="showSample()">📱 Sample Link</button>
        </div>
        <p style="font-size: 13px; margin: 0;">✨ Get real-time price comparison from 9 stores</p>
    </div>

    <div class="container">
        <div id="messageBox"></div>
        <div id="productContainer"></div>
    </div>

    <footer class="footer">
        <div class="footer-buttons"><button class="footer-btn">▶ Android App</button><button class="footer-btn">🍎 iOS App</button></div>
        <p style="text-align: center; margin-top: 1rem;">© 2026 Flaash AI - Real Product Comparison</p>
    </footer>

    <script>
        // దాన్ని వర్సెల్ సర్వర్‌కి కనెక్ట్ చేస్తున్నాం మామా
        const API_URL = window.location.origin + '/api';

        function showMessage(message, type = 'info') {
            const messageBox = document.getElementById('messageBox');
            const className = type === 'error' ? 'error' : 'success';
            messageBox.innerHTML = `<div class="${className}">${message}</div>`;
        }

        function showLoading() {
            document.getElementById('productContainer').innerHTML = `
                <div class="loading"><div class="loader"></div><p>Fetching product details from 9 stores...</p></div>`;
        }

        async function searchProduct() {
            const productUrl = document.getElementById('pasteInput').value.trim();
            if (!productUrl) { showMessage('❌ Please paste a product link first!', 'error'); return; }
            showLoading();

            try {
                const response = await fetch(`${API_URL}/search-product`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productUrl: productUrl })
                });
                const data = await response.json();
                if (!response.ok) { showMessage(`❌ ${data.error || 'Product not found'}`, 'error'); return; }
                displayProduct(data.product);
                showMessage(`✅ Found! Best price on ${data.product.cheapest} - Save ₹${data.product.savings}!`, 'success');
            } catch (error) {
                showMessage(`❌ Server Error. Vercel Backend loading, please retry in 5 seconds!`, 'error');
            }
        }

        function displayProduct(product) {
            const sortedStores = [...product.stores].sort((a, b) => a.actualPrice - b.actualPrice);
            let storesHTML = sortedStores.map(store => `
                <div class="store-item ${store.name === product.cheapest ? 'cheapest' : ''}">
                    <div class="store-icon">${store.icon}</div>
                    <div class="store-name">${store.name}</div>
                    <div class="store-price">${store.price}</div>
                </div>`).join('');

            document.getElementById('productContainer').innerHTML = `
                <div class="product-card">
                    <div class="product-header">
                        <div class="product-image">${product.image}</div>
                        <div class="product-info">
                            <div class="product-name">${product.name}</div>
                            <div class="product-features">${product.features.map(f => `<span class="feature">✓ ${f}</span>`).join('')}</div>
                        </div>
                        <div class="product-rating">${product.rating}</div>
                    </div>
                    <div class="savings-box">💰 Save ₹${product.savings} by buying from ${product.cheapest}!</div>
                    <div class="stores-section">
                        <div class="stores-label">Price on 9 Stores (Sorted by Price):</div>
                        <div class="stores-grid">${storesHTML}</div>
                    </div>
                </div>`;
        }

        function showSample() {
            const samples = ['amazon.in/Apple-iPhone-15-Pro-Max', 'flipkart.com/nikon-d780', 'flipkart.com/samsung-s24'];
            document.getElementById('pasteInput').value = samples[Math.floor(Math.random() * samples.length)];
        }

        function pasteLink() { document.getElementById('pasteInput').focus(); alert('Paste product link now!'); }
    </script>
</body>
</html>
