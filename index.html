<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flaashh.ai - Ice-Cool Smart Price Comparison Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 🎨 స్క్రీన్‌షాట్ 156075.jpg లో ఉన్న క్లాడ్ ఒరిజినల్ డార్క్ థీమ్ స్టైల్స్ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #0f1f2c 0%, #050b11 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
            margin-top: 1rem;
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -1px;
        }

        .logo span {
            color: #00d2ff;
        }

        .tagline {
            font-size: 14px;
            color: #a0aec0;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .search-box-container {
            width: 100%;
            max-width: 500px;
            background: rgba(0, 210, 255, 0.03);
            border: 2px solid #00d2ff;
            border-radius: 50px;
            padding: 6px 6px 6px 18px;
            display: flex;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            margin-bottom: 1.5rem;
        }

        .search-box-container input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 15px;
            padding-right: 10px;
        }

        .search-box-container input::placeholder {
            color: #4a5568;
        }

        .compare-btn {
            background: #00e676;
            color: #000000;
            border: none;
            outline: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .compare-btn:active {
            transform: scale(0.95);
        }

        .ad-container {
            width: 100%;
            max-width: 500px;
            border: 1px dashed #1a202c;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            color: #4a5568;
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 2rem;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        /* 📦 ప్రొడక్ట్ రిజల్ట్స్ కార్డ్ స్టైల్స్ */
        .product-card {
            background: rgba(26, 32, 44, 0.6);
            border: 1px solid #2d3748;
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 1rem;
            backdrop-filter: blur(10px);
        }

        .product-header {
            display: flex;
            gap: 16px;
            margin-bottom: 1rem;
        }

        .product-image {
            font-size: 45px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #ffffff;
        }

        .product-features {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .feature {
            font-size: 11px;
            color: #a0aec0;
            background: #2d3748;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .product-rating {
            font-size: 18px;
            font-weight: 700;
            color: #00e676;
        }

        .savings-box {
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid rgba(0, 230, 118, 0.3);
            color: #00e676;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }

        .stores-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .store-item {
            background: #1a202c;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #2d3748;
        }

        .store-item.cheapest {
            border: 2px solid #00e676;
            background: rgba(0, 230, 118, 0.05);
        }

        .store-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .store-name {
            font-size: 10px;
            color: #a0aec0;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .store-price {
            font-size: 12px;
            font-weight: 700;
            color: #00e676;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #a0aec0;
        }

        .loader {
            border: 4px solid #1a202c;
            border-top: 4px solid #00d2ff;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 14px;
            text-align: center;
        }
        .error { background: rgba(229, 62, 62, 0.2); border: 1px solid #e53e3e; color: #fc8181; }
        .success { background: rgba(49, 151, 149, 0.2); border: 1px solid #319795; color: #4fd1c5; }
    </style>
</head>
<body>

    <!-- 🌟 క్లాడ్ ఒరిజినల్ హెడర్ డిజైన్ -->
    <div class="logo-container">
        <div class="logo">Flaashh<span>.ai</span></div>
        <div class="tagline">❄️ Ice-Cool Smart Price Comparison Engine</div>
    </div>

    <!-- 🔍 క్లాడ్ ఒరిజినల్ సెర్చ్ బార్ -->
    <div class="search-box-container">
        <input type="text" placeholder="Paste Amazon, Flipkart, Myntra link..." id="pasteInput">
        <button class="compare-btn" onclick="searchProduct()">Compare</button>
    </div>

    <!-- 📢 అడ్వర్టైజ్మెంట్ హోల్డర్ -->
    <div class="ad-container">
        [ NATIVE POSTER AD — MONETAG ]
    </div>

    <!-- 📊 రిజల్ట్స్ డిస్ప్లే ఏరియా -->
    <div class="container">
        <div id="messageBox"></div>
        <div id="productContainer"></div>
    </div>

    <script>
        // వర్సెల్ బ్యాకెండ్‌కి ఆటోమేటిక్‌గా కనెక్ట్ అవుతుంది మామా
        const API_URL = window.location.origin + '/api';

        function showMessage(message, type = 'info') {
            const messageBox = document.getElementById('messageBox');
            const className = type === 'error' ? 'message error' : 'message success';
            messageBox.innerHTML = `<div class="${className}">${message}</div>`;
        }

        function showLoading() {
            document.getElementById('productContainer').innerHTML = `
                <div class="loading">
                    <div class="loader"></div>
                    <p>Scanning 9 stores for best prices...</p>
                </div>`;
        }

        async function searchProduct() {
            const productUrl = document.getElementById('pasteInput').value.trim();
            
            if (!productUrl) {
                showMessage('❌ Please paste a product link first!', 'error');
                return;
            }

            showLoading();
            document.getElementById('messageBox').innerHTML = '';

            try {
                const response = await fetch(`${API_URL}/search-product`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productUrl: productUrl })
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage(`❌ ${data.error || 'Product not found'}`, 'error');
                    return;
                }

                displayProduct(data.product);

            } catch (error) {
                showMessage(`❌ Server Connection Error. Please check Vercel deployment.`, 'error');
            }
        }

        function displayProduct(product) {
            const container = document.getElementById('productContainer');
            const sortedStores = [...product.stores].sort((a, b) => a.actualPrice - b.actualPrice);

            let storesHTML = sortedStores.map(store => `
                <div class="store-item ${store.name === product.cheapest ? 'cheapest' : ''}">
                    <div class="store-icon">${store.icon}</div>
                    <div class="store-name">${store.name}</div>
                    <div class="store-price">${store.price}</div>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="product-card">
                    <div class="product-header">
                        <div class="product-image">${product.image}</div>
                        <div class="product-info">
                            <div class="product-name">${product.name}</div>
                            <div class="product-features">
                                ${product.features.map(f => `<span class="feature">${f}</span>`).join('')}
                            </div>
                        </div>
                        <div class="product-rating">${product.rating}%</div>
                    </div>

                    <div class="savings-box">
                        🎉 Best Price on ${product.cheapest}! Save up to ₹${product.savings}
                    </div>

                    <div class="stores-grid">
                        ${storesHTML}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
